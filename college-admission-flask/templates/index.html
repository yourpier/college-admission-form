<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LSPU College Admission</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-container {
            max-width: 420px;
            margin: 80px auto;
            background: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .login-container h1 {
            color: #1e40af;
            margin-bottom: 30px;
        }
        .error {
            color: #dc2626;
            background: #fee2e2;
            padding: 14px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .divider {
            margin: 25px 0;
            border-top: 1px solid #ddd;
            position: relative;
        }
        .divider span {
            background: white;
            padding: 0 15px;
            color: #666;
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <h1>College Admission Portal</h1>
            
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="error">
                            ❌ {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST" id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" id="email" required autofocus>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" id="password" required>
                </div>
                <button type="submit" class="btn btn-submit" id="loginBtn">Login</button>
            </form>

            <div class="divider"><span>OR</span></div>

            <a href="{{ url_for('admission_form') }}">
                <button class="btn btn-register">New Applicant? Register / Apply Now</button>
            </a>

            <p style="margin-top: 25px; color:#666; font-size: 0.95rem;">
                Demo Login:<br>
                <strong>Admin:</strong> admin@gmail.com / testing1234<br>
                <strong>User:</strong> Use your registered email
            </p>
        </div>
    </div>

    <script>
        // Highlight fields if login failed
        window.addEventListener('load', function() {
            if (document.querySelector('.error')) {
                const emailField = document.getElementById('email');
                const passwordField = document.getElementById('password');
                
                if (emailField) emailField.style.borderColor = '#ef4444';
                if (passwordField) passwordField.style.borderColor = '#ef4444';
            }
        });
    </script>
</body>
</html>
