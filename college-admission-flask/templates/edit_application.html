<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Application</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .edit-header {
            background: linear-gradient(90deg, #1e40af, #3b82f6);
            color: white;
            padding: 25px;
            text-align: center;
            border-radius: 12px 12px 0 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="edit-header">
            <h1>Edit Your Application</h1>
            <p>Update your personal, contact, and address information</p>
        </div>

        <div class="form-content">
            <form id="editForm" action="{{ url_for('edit_application') }}" method="POST" novalidate>

                <!-- 1. Personal Information -->
                <div class="accordion-item active">
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <h2>1. Personal Information <span class="toggle-icon">▼</span></h2>
                    </div>
                    <div class="accordion-content">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Last Name <span class="required">*</span></label>
                                <input type="text" name="last_name" value="{{ application.last_name or '' }}" required>
                            </div>
                            <div class="form-group">
                                <label>First Name <span class="required">*</span></label>
                                <input type="text" name="first_name" value="{{ application.first_name or '' }}" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Middle Name <span class="required">*</span></label>
                                <input type="text" name="middle_name" value="{{ application.middle_name or '' }}" required>
                            </div>
                            <div class="form-group">
                                <label>Suffix</label>
                                <input type="text" name="name_suffix" value="{{ application.name_suffix or '' }}">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Birth Date <span class="required">*</span></label>
                                <input type="date" name="birth_date" value="{{ application.birth_date }}" required>
                            </div>
                            <div class="form-group">
                                <label>Sex <span class="required">*</span></label>
                                <select name="sex_id" required>
                                    <option value="1" {{ 'selected' if application.sex_id == 1 else '' }}>Male</option>
                                    <option value="2" {{ 'selected' if application.sex_id == 2 else '' }}>Female</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Civil Status <span class="required">*</span></label>
                                <select name="civil_status_id" required>
                                    <option value="1" {{ 'selected' if application.civil_status_id == 1 else '' }}>Single</option>
                                    <option value="2" {{ 'selected' if application.civil_status_id == 2 else '' }}>Married</option>
                                    <option value="3" {{ 'selected' if application.civil_status_id == 3 else '' }}>Widowed</option>
                                    <option value="4" {{ 'selected' if application.civil_status_id == 4 else '' }}>Separated</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Citizenship</label>
                                <input type="text" name="citizenship" value="{{ application.citizenship or 'Filipino' }}">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. Contact Information -->
                <div class="accordion-item">
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <h2>2. Contact Information <span class="toggle-icon">▼</span></h2>
                    </div>
                    <div class="accordion-content">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Contact Number <span class="required">*</span></label>
                                <input type="tel" name="primary_contact_number" value="{{ application.primary_contact_number or '' }}" required>
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" value="{{ application.primary_contact_email or '' }}" disabled>
                                <small style="color:#666;">(Email cannot be changed)</small>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 3. Permanent Address -->
                <div class="accordion-item">
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <h2>3. Permanent Address <span class="toggle-icon">▼</span></h2>
                    </div>
                    <div class="accordion-content">
                        <div class="form-row">
                            <div class="form-group">
                                <label>House No. / Unit <span class="required">*</span></label>
                                <input type="text" name="house_number" value="{{ application.house_number or '' }}" required>
                            </div>
                            <div class="form-group">
                                <label>Street <span class="required">*</span></label>
                                <input type="text" name="street" value="{{ application.street or '' }}" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Subdivision / Village</label>
                            <input type="text" name="subdivision" value="{{ application.subdivision or '' }}">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Barangay / Town <span class="required">*</span></label>
                                <input type="text" name="town" value="{{ application.town or '' }}" required>
                            </div>
                            <div class="form-group">
                                <label>City <span class="required">*</span></label>
                                <input type="text" name="city" value="{{ application.city or '' }}" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Province <span class="required">*</span></label>
                                <input type="text" name="province" value="{{ application.province or '' }}" required>
                            </div>
                            <div class="form-group">
                                <label>Postal Code <span class="required">*</span></label>
                                <input type="number" name="postal_code" value="{{ application.postal_code or '' }}" required>
                            </div>
                        </div>
                    </div>
                </div>

                <div style="margin: 40px 0; text-align: center;">
                    <a href="{{ url_for('user_dashboard') }}" 
                       style="padding:12px 25px; background:#6b7280; color:white; text-decoration:none; border-radius:8px; margin-right:15px;">
                        ← Cancel
                    </a>
                    <button type="submit" class="btn btn-submit">💾 Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
